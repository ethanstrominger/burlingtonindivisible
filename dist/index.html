<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burlington Indivisible</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div id="menu-container"></div>
  <div class="content">
    <main class="main"> 
      <section style="margin: 1.5rem 0 2rem 0; padding: 2rem 1.5rem; border: 3px solid #23408e; border-radius: 10px; background: #f7faff; text-align: center;">
        <h1 style="margin: 0; font-size: clamp(2rem, 6vw, 3.6rem); line-height: 1.15; font-weight: 900; color: #17316f; letter-spacing: 0.01em;">
          Exciting News!
        </h1>
        <p style="margin: 1rem auto 0 auto; max-width: 900px; font-size: clamp(1.2rem, 3.2vw, 2rem); line-height: 1.35; font-weight: 800; color: #1f2b44;">
          We are now <strong>BurlingtonIndivisible.org</strong>.
        </p>
        <p style="margin: 0.8rem auto 0 auto; max-width: 900px; font-size: clamp(1.05rem, 2.8vw, 1.45rem); line-height: 1.45; font-weight: 700; color: #1f2b44;">
          We are proud to be an Indivisible group and to stand behind the policies they support.
        </p>
      </section>

    </main>
  </div>

  <script src="menu.js?v=5"></script>
  <script>
    if (typeof initMenu === 'function') {
      initMenu();
    } else {
      window.addEventListener('DOMContentLoaded', function () {
        if (typeof initMenu === 'function') initMenu();
      });
    }
  </script>

</body>
</html>
